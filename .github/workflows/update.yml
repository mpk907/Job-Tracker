name: Update jobs & deploy

on:
  schedule:
    # Daily at 06:00 UTC (08:00 Berlin)
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scraper/**"
      - "docs/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape ATS + boards
        run: python scraper/run.py
        continue-on-error: true

      - name: Discover new companies (YC + HN + RSS)
        run: python scraper/discover.py
        continue-on-error: true

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jobs.json docs/candidates.json data/candidates.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
